<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrust 8-4-3 SIP Growth Calculator</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  padding:15px;
  margin:0;
}

h2{text-align:center;}

.card{
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

label{
  font-weight:600;
  display:block;
  margin-top:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:16px;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  background:#0a7cff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
}

.share-btn{
  background:#25D366;
}

/* TABLE SCROLL FIX */
.table-wrapper{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling: touch;
  margin-top:15px;
}

table{
  min-width:750px;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#0a7cff;
  color:white;
}

.phase1{ background:#d6e4ff; }
.phase2{ background:#ffe6cc; }
.phase3{ background:#e6ffe6; }

/* GRAPH */
.bar{
  height:35px;
  margin:12px 0;
  color:white;
  text-align:right;
  padding-right:10px;
  line-height:35px;
  border-radius:6px;
  font-weight:bold;
}

.bar1{ background:#1f4fa3; }
.bar2{ background:#ff8800; }
.bar3{ background:#2e7d32; }

</style>
</head>
<body>

<h2>FinTrust 8-4-3 SIP Growth Calculator</h2>

<div class="card">

<label>Monthly SIP (₹)</label>
<input type="number" id="sipAmount" value="10000">

<label>Step-Up % Per Year (Optional)</label>
<input type="number" id="stepUp" value="0">

<label>Expected Annual Return (%)</label>
<input type="number" id="returnRate" value="12">

<label>Total Years</label>
<input type="number" id="totalYears" value="15">

<button onclick="calculateSIP()">Calculate Growth</button>
<button class="share-btn" onclick="shareWhatsApp()">Share via WhatsApp</button>

</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Phase</th>
<th>Years Covered</th>
<th>Total Invested</th>
<th>Estimated Value</th>
<th>Total Growth</th>
</tr>
</thead>
<tbody id="resultTable"></tbody>
</table>
</div>

<div id="graphArea"></div>

<script>

function formatCurrency(num){
  return "₹ " + Math.round(num).toLocaleString("en-IN");
}

function calculateStepUpFutureValue(sip, rate, years, stepUp){

  let monthlyRate = rate/100/12;
  let totalValue = 0;
  let currentSip = sip;

  for(let y=1;y<=years;y++){

    let yearlyValue;

    if(monthlyRate === 0){
      yearlyValue = currentSip * 12;
    } else {
      yearlyValue = currentSip *
        ((Math.pow(1+monthlyRate,12)-1)/monthlyRate) *
        Math.pow(1+monthlyRate,(years-y)*12);
    }

    totalValue += yearlyValue;
    currentSip = currentSip * (1 + stepUp/100);
  }

  return totalValue;
}

function calculateSIP(){

  let sip = parseFloat(document.getElementById("sipAmount").value) || 0;
  let rate = parseFloat(document.getElementById("returnRate").value) || 0;
  let years = parseFloat(document.getElementById("totalYears").value) || 0;
  let stepUp = parseFloat(document.getElementById("stepUp").value) || 0;

  if(sip<=0 || years<=0){
    alert("Please enter valid SIP and Years.");
    return;
  }

  let phaseYears = [8,4,3];
  let totalPhaseYears = 15;

  let table = document.getElementById("resultTable");
  let graph = document.getElementById("graphArea");

  table.innerHTML="";
  graph.innerHTML="";

  let cumulativeYears=0;

  let finalValue = calculateStepUpFutureValue(sip,rate,years,stepUp);

  for(let i=0;i<3;i++){

    let proportionalYears = (phaseYears[i]/totalPhaseYears)*years;
    cumulativeYears += proportionalYears;

    let investedSIP = 0;
    let tempSip = sip;

    for(let y=1;y<=Math.floor(cumulativeYears);y++){
      investedSIP += tempSip*12;
      tempSip = tempSip*(1+stepUp/100);
    }

    let invested = investedSIP;

    let value = calculateStepUpFutureValue(sip,rate,cumulativeYears,stepUp);

    let growth = value - invested;

    let phaseName = i==0?"Phase 1 – Patience":
                    i==1?"Phase 2 – Momentum":
                    "Phase 3 – Compounding";

    let rowClass = i==0?"phase1":i==1?"phase2":"phase3";

    table.innerHTML += `
      <tr class="${rowClass}">
        <td>${phaseName}</td>
        <td>${cumulativeYears.toFixed(1)}</td>
        <td>${formatCurrency(invested)}</td>
        <td>${formatCurrency(value)}</td>
        <td>${formatCurrency(growth)}</td>
      </tr>
    `;

    let barWidth = (value/finalValue)*100;
    let barClass = i==0?"bar1":i==1?"bar2":"bar3";

    graph.innerHTML += `
      <div class="bar ${barClass}" style="width:${barWidth}%">
        ${formatCurrency(value)}
      </div>
    `;
  }
}

function shareWhatsApp(){

  let sip = parseFloat(document.getElementById("sipAmount").value) || 0;
  let rate = parseFloat(document.getElementById("returnRate").value) || 0;
  let years = parseFloat(document.getElementById("totalYears").value) || 0;
  let stepUp = parseFloat(document.getElementById("stepUp").value) || 0;

  function formatINR(num){
    return Math.round(num).toLocaleString("en-IN");
  }

  let phaseRatio = [8,4,3];
  let totalRatio = 15;

  let cumulativeYears = 0;
  let phaseDetails = "";

  for(let i=0;i<3;i++){

    let phaseYears = (phaseRatio[i]/totalRatio)*years;
    cumulativeYears += phaseYears;

    // Calculate value till this phase
    let value = calculateStepUpFutureValue(sip,rate,cumulativeYears,stepUp);

    // Calculate invested till this phase
    let invested = 0;
    let tempSip = sip;

    for(let y=1;y<=Math.floor(cumulativeYears);y++){
      invested += tempSip*12;
      tempSip = tempSip*(1+stepUp/100);
    }

    let phaseName = i==0?"Phase 1 (Patience)":
                    i==1?"Phase 2 (Momentum)":
                    "Phase 3 (Compounding)";

    phaseDetails +=
      phaseName + " - After " + cumulativeYears.toFixed(1) + " Years\n" +
      "Invested: Rs " + formatINR(invested) + "\n" +
      "Value: Rs " + formatINR(value) + "\n\n";
  }

  let finalValue = calculateStepUpFutureValue(sip,rate,years,stepUp);

  let totalInvested = 0;
  let tempSip = sip;
  for(let y=1;y<=years;y++){
    totalInvested += tempSip*12;
    tempSip = tempSip*(1+stepUp/100);
  }

  let totalGrowth = finalValue - totalInvested;

  let message =
"FinTrust 8-4-3 Wealth Projection\n\n" +
"Monthly SIP: Rs " + formatINR(sip) + "\n" +
"Step-Up: " + stepUp + "%\n" +
"Return: " + rate + "%\n" +
"Duration: " + years + " Years\n\n" +
phaseDetails +
"Total Invested: Rs " + formatINR(totalInvested) + "\n" +
"Final Value: Rs " + formatINR(finalValue) + "\n" +
"Total Growth: Rs " + formatINR(totalGrowth) + "\n\n" +
"Power of staying invested 💰";

  let url = "https://wa.me/?text=" + encodeURIComponent(message);
  window.open(url,"_blank");
}

calculateSIP();

</script>

</body>
</html>
